# deny.toml — supply-chain policy for autobuilder-scaffolded projects.
# Run: cargo deny check

[graph]
targets = []

[advisories]
version = 2
yanked = "deny"
unmaintained = "workspace"
# RUSTSEC-2026-0073 uses CVSS 4.0 which cargo-deny ≤0.16 cannot parse; waived
# until cargo-deny ships CVSS 4.0 support. This crate is not a direct dep.
ignore = ["RUSTSEC-2026-0073"]

[licenses]
version = 2
allow = [
  "MIT",
  "MIT-0",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",
  "MPL-2.0",
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
# Path deps (mqo siblings) have no version constraint by design; wildcards = "deny"
# applies to registry deps only. Exempt the three sibling path deps explicitly.
wildcards = "warn"
skip = [
  # thiserror v1 pulled by mqo-result-profiler, v2 by mqo-vega-emitter; both are
  # transitive — warn only.
]
deny = [
  # Crates that have caused real-world soundness or supply-chain incidents,
  # or whose usage is a strong smell in any new project.
  { crate = "openssl", reason = "use rustls; avoid native OpenSSL dependency unless absolutely required" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
# Path deps (mqo-result-profiler, mqo-chart-recommender, mqo-vega-emitter) are
# local siblings; cargo-deny skips path crates by default.
