[package]
name = "mqo-vega-emitter"
version = "0.3.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
publish = false
description = "Vega-Lite v5 spec emitter from chart-recommendation.v1 + rows for the bi-toolkit"

[lints.rust]
unsafe_code = "deny"
missing_docs = "warn"
rust_2018_idioms = { level = "warn", priority = -1 }
unused_must_use = "deny"
unreachable_pub = "warn"

[lints.clippy]
# Strict everyday lints
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }

# BAD_RUST-aligned restrictions: error on dishonest patterns
undocumented_unsafe_blocks = "deny"
multiple_unsafe_ops_per_block = "deny"
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
todo = "deny"
unimplemented = "deny"
unreachable = "deny"
indexing_slicing = "warn"
mem_forget = "deny"
as_conversions = "warn"
float_arithmetic = "warn"
dbg_macro = "deny"
print_stdout = "warn"
print_stderr = "warn"

# Tame pedantic noise without weakening BAD_RUST coverage
module_name_repetitions = "allow"
missing_errors_doc = "warn"
missing_panics_doc = "warn"

[profile.dev]
opt-level = 0
debug = true

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "debuginfo"
panic = "abort"

[features]
real-hardware = []
## Enable render-verification via the `vl-convert` CLI (subprocess).
##
## **WARNING: CI/release-gate use only.** The `render` feature compiles in
## `render_check()` / `corpus_render_gate()` / `--render <out>` capability.
## At runtime it requires the `vl-convert` CLI on PATH (install with
## `pip install vl-convert-python`).  `vl-convert` embeds the Vega/Vega-Lite
## JavaScript toolchain via a V8 (`deno_core`) runtime and is large.
## This feature has **no compile-time dependency** — only the subprocess is
## optional.  Default-build consumers see no change in the dependency tree.
render = []

[lib]
name = "mqo_vega_emitter"
path = "src/lib.rs"

[[bin]]
name = "mqo-vega-emitter"
path = "src/main.rs"

[dependencies]
serde_json = "1"
thiserror = "2"

[dev-dependencies]
proptest = "1"
