[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "ISC",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
# Path dependencies without a version are flagged as "wildcards" by cargo-deny.
# mqo-spec is a local workspace sibling dep pinned by path, not a registry dep.
# We allow wildcards here because path-only deps are inherently version-pinned
# via the Cargo.lock.
wildcards = "allow"
deny = []

[advisories]
# cargo-deny 0.18.x does not support CVSS:4.0; the advisory DB parse may fail
# with "unsupported CVSS version: 4.0". Per bad-rust.md §"Known tooling quirk",
# this is a cargo-deny bug, not a crate vulnerability. We ignore the advisory
# check in the hard gate; `cargo deny check licenses bans` is the gate-passing check.
ignore = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-git = [
  "https://github.com/joeyen-atscale/mqo-spec",
]
