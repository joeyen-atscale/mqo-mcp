[package]
name = "mqo-mdx-compiler"
version = "0.2.0"
edition = "2021"
rust-version = "1.85.0"
description = "Compile a BoundMqo to an MDX SELECT query string (cellset semantics)"
license = "MIT OR Apache-2.0"
keywords = ["mdx", "mqo", "semantic-layer", "olap", "compiler"]
categories = ["command-line-utilities"]

[[bin]]
name = "mqo-mdx"
path = "src/main.rs"

[lib]
name = "mqo_mdx_compiler"
path = "src/lib.rs"

[dependencies]
mqo-spec = { path = "../mqo-spec" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
thiserror = "1"

[dev-dependencies]
tempfile = "3"
proptest = "1"

[features]
default = []
