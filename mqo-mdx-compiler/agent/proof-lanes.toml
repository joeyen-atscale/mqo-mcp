# proof-lanes.toml — change-class → required-lane routing.
# READ-ONLY after scaffold. The edit-agent must NOT modify this.
#
# Lifted shape from jankurai/agent/proof-lanes.toml. Each lane has a set of
# globs that route to it. A Stage-3 advance requires every changed path to
# resolve to ≥1 lane AND that lane's required_command must be green.

[[lane]]
id = "rust-source"
description = "Behavior changes in src/"
globs = ["src/**/*.rs"]
required_commands = [
  "cargo check --workspace",
  "cargo clippy --workspace -- -D warnings",
  "cargo test --workspace",
]

[[lane]]
id = "rust-tests"
description = "Test-only changes (only allowed via intent-card amendment)"
globs = ["tests/**/*.rs"]
required_commands = [
  "cargo test --workspace",
]

[[lane]]
id = "deps"
description = "Cargo.toml / Cargo.lock changes"
globs = ["Cargo.toml", "Cargo.lock"]
required_commands = [
  "cargo check --workspace",
  "cargo deny check",
]

[[lane]]
id = "ci"
description = "GitHub Actions workflow changes"
globs = [".github/workflows/**"]
required_commands = [
  "scripts/audit.sh",
]

[[lane]]
id = "harness-readonly"
description = "Harness files; should never change after scaffold"
globs = [
  "scripts/run-metrics.sh",
  "scripts/audit.sh",
  "scripts/risk-gate.sh",
  "clippy.toml",
  "deny.toml",
  "rust-toolchain.toml",
]
required_commands = [
  "exit 1",
]
note = "Any change to a harness-readonly path fails the gate. Use an intent-card amendment to legitimately modify."

[[lane]]
id = "agent-metadata"
description = "Agent harness metadata files (intent-card, owner-map, test-map, proof-lanes)"
globs = [
  "agent/intent-card.json",
  "agent/owner-map.json",
  "agent/test-map.json",
  "agent/proof-lanes.toml",
]
required_commands = [
  "cargo test --workspace",
]

[[lane]]
id = "project-dotfiles"
description = "Top-level project config that does not affect build correctness (.gitignore, README, etc.)"
globs = [
  ".gitignore",
  "README.md",
  "README*",
  "LICENSE*",
  "PRD-*.md",
  "extended-gates.toml",
]
required_commands = [
  "cargo check --workspace",
]

[[lane]]
id = "vendor"
description = "Vendored private path-dep snapshots (e.g. vendor/mqo-spec)"
globs = [
  "vendor/**",
]
required_commands = [
  "cargo check --workspace",
  "cargo test --workspace",
]
