[package]
name = "mqo-spec"
version = "0.2.0"
edition = "2021"
rust-version = "1.70.0"
description = "Multidimensional Query Object — typed, serde-serializable schema and JSON Schema contract for the MQO fleet"
license = "MIT OR Apache-2.0"
repository = "https://github.com/joeyen-atscale/mqo-spec"
keywords = ["semantic-layer", "olap", "query", "schema", "serde"]
categories = ["data-structures", "encoding"]

[lib]
name = "mqo_spec"
path = "src/lib.rs"

[[bin]]
name = "mqo-spec"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = { version = "0.8", features = ["derive"] }
thiserror = "1"

[dev-dependencies]
# none needed — all test deps are in [dependencies]

[features]
default = []
