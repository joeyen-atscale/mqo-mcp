# deny.toml — supply-chain policy for mqo-dax-compiler.
# Run: cargo deny check

[graph]
targets = []

[advisories]
version = 2
yanked = "deny"
unmaintained = "workspace"
ignore = []

[licenses]
version = 2
allow = [
  "MIT",
  "MIT-0",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CC0-1.0",
  "Zlib",
  "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
# Path-only workspace members don't carry a version constraint; allow them.
wildcards = "allow"
deny = [
  { crate = "openssl", reason = "use rustls; avoid native OpenSSL dependency" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
  "https://github.com/joeyen-atscale/mqo-spec",
]
