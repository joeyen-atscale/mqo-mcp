[package]
name = "mqoguard-null-path-detector"
version = "0.1.0"
edition = "2021"
rust-version = "1.88.0"
license = "MIT OR Apache-2.0"
publish = false
description = "Detect all-NULL cross-fact results as path_incompatible in MQO"

[lints.rust]
unsafe_code = "deny"
missing_docs = "warn"
rust_2018_idioms = { level = "warn", priority = -1 }
unused_must_use = "deny"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
undocumented_unsafe_blocks = "deny"
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
todo = "deny"
unimplemented = "deny"
unreachable = "deny"
dbg_macro = "deny"
module_name_repetitions = "allow"

[dependencies]
mqoguard-column-group-enrichment = { path = "../mqoguard-column-group-enrichment" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.dev]
opt-level = 0
debug = true

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "debuginfo"
panic = "abort"
