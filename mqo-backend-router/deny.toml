[graph]
targets = []

[advisories]
version = 2
yanked = "deny"
unmaintained = "workspace"
ignore = []

[licenses]
version = 2
allow = [
  "MIT",
  "MIT-0",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",
  "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
# path = dependencies are counted as wildcards by cargo-deny when they lack a
# version spec. Since mqo-spec is a sibling workspace crate (local path dep),
# wildcards must be "allow" here; we rely on Cargo.lock for reproducibility.
multiple-versions = "warn"
wildcards = "allow"
deny = [
  { crate = "openssl", reason = "use rustls; avoid native OpenSSL dependency" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
