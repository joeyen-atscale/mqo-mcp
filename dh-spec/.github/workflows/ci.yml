name: CI

on:
  push:
    branches: [main, "autobuilder/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4305c38b26b5d1c8a1e6a7b47a25b09f0c894c49  # stable
        with:
          toolchain: "1.85.0"
          components: clippy, rustfmt
      - name: Cache Cargo
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6  # v2.7.8
      - name: cargo check
        run: cargo check --workspace
      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings
      - name: cargo test --release
        run: cargo test --workspace --release
      - name: cargo doc (no-deps, warn missing-docs)
        run: RUSTDOCFLAGS="-W missing-docs" cargo doc --no-deps

  deny:
    name: Supply-Chain (licenses + bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: EmbarkStudios/cargo-deny-action@34899fc7ba81ca14b7f8a60d89c4a8c0f5e4e44  # v2.0.10
        with:
          command: check licenses bans
          arguments: --all-features
