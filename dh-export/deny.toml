[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",
]

[bans]
multiple-versions = "warn"
deny = []
# Path-only intra-fleet deps carry no version; suppress wildcard warnings.
wildcards = "allow"

[advisories]
# cargo-deny 0.18+ removed the top-level 'ignore' key; use per-advisory waivers instead.
