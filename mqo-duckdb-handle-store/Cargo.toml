[package]
name = "mqo-duckdb-handle-store"
version = "0.1.0"
edition = "2021"
description = "Result-set handle store for mqo-mcp-server: MemStore default + DuckDB opt-in via Cargo feature"
license = "MIT"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
duckdb = { version = "1", features = ["bundled"], optional = true }

[features]
default = []
duckdb = ["dep:duckdb"]

[dev-dependencies]
