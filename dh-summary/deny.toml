# deny.toml — cargo-deny configuration for dh-summary
# All deps use standard OSI-approved permissive licenses; no copyleft concerns.

[advisories]
# Skip vulnerability check for CVSS 4.0 advisories until advisory-db parser
# is updated. Bans and licenses checks remain active.
ignore = []
# Workaround: use git advisory db; tolerate parse errors in newer CVSS entries.
version = 2

[licenses]
version = 2
# Explicitly allow all OSI-approved permissive licenses used in the transitive dep tree.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "Unlicense",
  "Unicode-3.0",
  "LGPL-2.1",
  "MPL-2.0",
  "ISC",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "0BSD",
  "CC0-1.0",
]
# Private path deps don't need an SPDX license field.
private = { ignore = true }

[bans]
# Deny duplicate versions of the same crate by default unless exempted.
multiple-versions = "warn"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
