name: CI

on:
  push:
    branches: [ main, "autobuilder/**" ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Checkout dependencies (dh-spec, dh-store)
        run: |
          git clone https://github.com/joeyen-atscale/dh-spec ../dh-spec
          git clone https://github.com/joeyen-atscale/dh-store ../dh-store

      - name: cargo check
        run: cargo check --workspace

      - name: cargo clippy
        run: cargo clippy --workspace --release -- -D warnings

      - name: cargo test
        run: cargo test --workspace --release

      - name: cargo deny (licenses + bans)
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check licenses bans
          arguments: --config deny.toml
