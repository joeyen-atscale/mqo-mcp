[package]
name = "mqo-paramq-bench"
version = "0.1.0"
edition = "2021"
description = "Offline t-bench: free-form vs structured MQO pass@k over the mcp-tuner failure-mode corpus"

[[bin]]
name = "mqo-paramq-bench"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
mqo-param-validator = { git = "https://github.com/joeyen-atscale/mqo-param-validator" }

[dev-dependencies]
tempfile = "3"
